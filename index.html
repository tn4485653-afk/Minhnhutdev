<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Fire Anti-Cheat</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{
    background:#0d0d0d;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    background:#141414;
    padding:30px;
    border-radius:10px;
    width:400px;
    border:1px solid #ff6600;
}
h2{text-align:center;margin-bottom:20px;color:#ff6600}
input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    background:#000;
    color:#fff;
    border:1px solid #333;
    text-align:center;
}
button{
    width:100%;
    padding:12px;
    background:#ff6600;
    border:none;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}
.result{
    margin-top:15px;
    padding:10px;
    display:none;
    text-align:center;
}
.success{background:#330000;color:#ff4444}
.error{background:#333300;color:#ffcc00}
</style>
</head>

<body>

<div class="container">
    <h2>ANTI CHEAT</h2>

    <form onsubmit="handleBand(event)">
        <input id="uid" placeholder="Nhập UID..." required>
        <button id="btn">BAN ACCOUNT</button>
    </form>

    <div id="result" class="result"></div>
</div>

<script>
async function handleBand(e){
    e.preventDefault();

    const uid = document.getElementById("uid").value.trim();
    const result = document.getElementById("result");
    const btn = document.getElementById("btn");

    if(!/^\d+$/.test(uid)){
        result.className = "result error";
        result.innerText = "❌ UID không hợp lệ!";
        result.style.display = "block";
        return;
    }

    btn.innerText = "ĐANG XỬ LÝ...";
    btn.disabled = true;
    result.style.display = "none";

    try{
        const res = await fetch(`https://band-7-day.onrender.com/login?open_id=cfa47786c94616c5453163c2f9af5229&token=084998e35ddbc0f2d86947a44acd2a32b5eb7f900411c01b8b1a5bab75453945&uid=${uid}`);
        
        const data = await res.text();

        result.className = "result success";
        result.innerHTML = "🔥 Response:<br>" + data;
        result.style.display = "block";

    }catch(err){
        result.className = "result error";
        result.innerText = "❌ Không gọi được API (có thể bị CORS)";
        result.style.display = "block";
    }

    btn.innerText = "BAN ACCOUNT";
    btn.disabled = false;
}
</script>

</body>
</html>
